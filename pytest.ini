[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show short tracebacks by default; -v can be added on the CLI.
addopts = --tb=short -ra

# Treat unknown markers as errors so typos in @pytest.mark.X don't
# silently get ignored.
filterwarnings =
    error::pytest.PytestUnknownMarkWarning
